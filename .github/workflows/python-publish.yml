name: python-publish

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    generate-stubs:
        name: generate pyi stubs
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: Swatinem/rust-cache@v2

            - name: Generate pyi stubs (release pipeline only)
              run: cargo run -p cosmolkit-py --no-default-features --features dev-stub --bin stub_gen

            - name: Upload pyi artifact
              uses: actions/upload-artifact@v4
              with:
                  name: python-stubs
                  path: python/cosmolkit.pyi
                  if-no-files-found: error

    build-wheels:
        name: build wheels on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        needs:
            - generate-stubs
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download pyi stubs
              uses: actions/download-artifact@v4
              with:
                  name: python-stubs
                  path: python

            - name: Build wheels
              uses: PyO3/maturin-action@v1
              with:
                  command: build
                  working-directory: python
                  args: --release --manifest-path Cargo.toml --features release-abi3-py39 --out dist

            - name: Upload wheels
              uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}
                  path: python/dist

    build-sdist:
        name: build sdist
        runs-on: ubuntu-latest
        needs:
            - generate-stubs

        steps:
            - uses: actions/checkout@v4

            - name: Download pyi stubs
              uses: actions/download-artifact@v4
              with:
                  name: python-stubs
                  path: python

            - name: Build sdist
              uses: PyO3/maturin-action@v1
              with:
                  command: sdist
                  working-directory: python
                  args: --manifest-path Cargo.toml --out dist

            - name: Upload sdist
              uses: actions/upload-artifact@v4
              with:
                  name: sdist
                  path: python/dist

    publish:
        name: publish to pypi
        runs-on: ubuntu-latest
        needs:
            - build-wheels
            - build-sdist

        steps:
            - name: Download wheel artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: wheels-*
                  path: dist
                  merge-multiple: true

            - name: Download sdist artifact
              uses: actions/download-artifact@v4
              with:
                  name: sdist
                  path: dist

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  password: ${{ secrets.PYPI_API_TOKEN }}
